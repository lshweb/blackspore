            element: s.element,
            symbol: s.symbol,

        }
      }
      return deck;
    }

      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;

    function getMinorReading(card, reversed, positionType) {
      const suitData = MINOR_READINGS[card.suit];
      const templates = {
        past: suitData.past_templates,
        present: suitData.present_templates,
        future: suitData.future_templates,
        situation: suitData.present_templates,
        challenge: suitData.challenge_templates,
        foundation: suitData.present_templates,
        outcome: suitData.future_templates,
      };
      const chosen = templates[positionType] || suitData.present_templates;
      const text = chosen[Math.floor(Math.random() * chosen.length)];
      if (reversed) {
        return text.replace(/burns/, "smolders").replace(/flows/, "stagnates").replace(/speaks/, "whispers weakly").replace(/matters/, "seems hollow");
      }
      return text;
    }

    function generateReading(cards, reversals, spreadInfo, question) {
      const positionNames = spreadInfo.positions;
      let reading = "";

      if (question) {
        reading += `You asked: "${question}" The spores have answered.\n\n`;
      }

      const cardReadings = cards.map((card, i) => {
        const pos = positionNames[i];
        const rev = reversals[i];
        let posKey = pos.toLowerCase();
        if (posKey.includes("past")) posKey = "past";
        else if (posKey.includes("present")) posKey = "present";
        else if (posKey.includes("future")) posKey = "future";
        else if (posKey.includes("situation")) posKey = "situation";
        else if (posKey.includes("challenge")) posKey = "challenge";
        else if (posKey.includes("foundation")) posKey = "foundation";
        else if (posKey.includes("outcome")) posKey = "outcome";
        else posKey = "general";

        let text = "";
        if (card.arcana === "major") {
          text = CARD_READINGS[card.name]?.[rev ? "reversed" : "upright"]?.[posKey] || "The ancient wisdom dwells here.";
        } else {
          text = getMinorReading(card, rev, posKey);
        }

        return {
          card,
          reversed: rev,
          position: pos,
          reading: text,
        };
      });

      const baseReading = cardReadings.map(cr => {
        let line = `${cr.position}: ${cr.card.name}`;
        if (cr.reversed) line += " (reversed)";
        line += ". " + cr.reading;
        return line;
      }).join("\n\n");

      reading += baseReading;

      if (cards.length >= 2) {
        reading += "\n\n";
        const weavingLines = [
          "The threads of the mycelium bind these cards together, showing you a path.",
          "Deep beneath the surface, these cards speak a single truth: you are becoming what you are meant to be.",
          "The forest whispers its message through these cards, asking you to listen not just with your mind, but with your whole being.",
          "These cards form a map of your inner landscape. Follow it with courage.",
        ];
        reading += weavingLines[Math.floor(Math.random() * weavingLines.length)];
      }

      if (question) {
        reading += "\n\nReturn to your question. The answer lives not in the cards, but in what they have stirred within you.";
      }

      return reading;
    }

      if (card.arcana === "major") {
        return CARD_ART[card.name] || { glyph: "\u2727", bg: "linear-gradient(135deg, #0a1a0a, #1a3a2a)" };
      }
      return { glyph: SUIT_GLYPHS[card.suit] || "\u2727", bg: SUIT_COLORS[card.suit] };

    function TypingText({ text }) {
      const [displayed, setDisplayed] = useState("");
      const idx = useRef(0);

      useEffect(() => {
        setDisplayed("");
        idx.current = 0;
        const interval = setInterval(() => {
          if (idx.current < text.length) {
            setDisplayed(text.slice(0, idx.current + 1));
            idx.current++;
          } else {
            clearInterval(interval);
          }
        }, 15);
        return () => clearInterval(interval);
      }, [text]);

      return (
        <span>
          {displayed}
          <span style={{ opacity: displayed.length < text.length ? 1 : 0, transition: "opacity 0.3s", color: "#4aff8c" }}>{"\u258d"}</span>
        </span>
      );
    }

      const [spread, setSpread] = useState("three");
      const [drawnCards, setDrawnCards] = useState([]);
      const [reversals, setReversals] = useState([]);
      const [revealed, setRevealed] = useState(false);
      const [reading, setReading] = useState("");
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const readingRef = useRef(null);

      const drawCards = () => {
        const deck = shuffle(buildFullDeck());
        const count = SPREADS[spread].count;
        const cards = deck.slice(0, count);
        const revs = cards.map(() => Math.random() < 0.3);
        setDrawnCards(cards);
        setReversals(revs);
        setRevealed(false);
        setReading("");
        setError(null);
        setPhase("cards");
        setTimeout(() => setRevealed(true), 800);
        setTimeout(() => getReading(cards, revs), 2000);
      };

      const getReading = (cards, revs) => {
        setLoading(true);
        const spreadInfo = SPREADS[spread];
        setTimeout(() => {
          try {
            const text = generateReading(cards, revs, spreadInfo, question);
            setReading(text);
          } catch (err) {
            setError("The forest grows silent. The spirits withdraw. Please try again.");
          }
          setLoading(false);
        }, 1500);
      };

      const reset = () => {
        setPhase("welcome");
        setQuestion("");
        setDrawnCards([]);
        setReversals([]);
        setRevealed(false);
        setReading("");
        setError(null);
      };

      useEffect(() => {
        if (reading && readingRef.current) {
          readingRef.current.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      }, [reading]);

      return (
        <div style={{
          minHeight: "100vh",
          background: "radial-gradient(ellipse at 50% 0%, #0d1a0f 0%, #060a06 50%, #030503 100%)",
          color: "#c8d4b8",
          fontFamily: "'Cormorant Garamond', Georgia, serif",
          position: "relative", overflow: "hidden",
        }}>
          <style>{`
            @keyframes sporePulse { 0%,100% { opacity: 0.4; text-shadow: 0 0 20px rgba(74,255,140,0.1); } 50% { opacity: 1; text-shadow: 0 0 30px rgba(74,255,140,0.4); } }
            @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
            @keyframes sporeFloat {
              0% { opacity: 0; transform: translateY(0) translateX(0); }
              10% { opacity: 0.8; }
              90% { opacity: 0.2; }
              100% { opacity: 0; transform: translateY(-100vh) translateX(var(--drift, 20px)); }
            }
            @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
            input::placeholder { color: #3a4a3a; }
            input:focus { outline: none; border-color: #2a5a3a !important; box-shadow: 0 0 20px rgba(74,255,140,0.08); }
            textarea::placeholder { color: #3a4a3a; }
            textarea:focus { outline: none; border-color: #2a5a3a !important; box-shadow: 0 0 20px rgba(74,255,140,0.08); }
          `}</style>

          {/* Ambient forest glow */}
          <div style={{
            position: "absolute", inset: 0, pointerEvents: "none",
            background: "radial-gradient(ellipse at 20% 80%, rgba(74,255,140,0.02) 0%, transparent 50%), radial-gradient(ellipse at 80% 20%, rgba(74,255,140,0.015) 0%, transparent 40%), radial-gradient(ellipse at 50% 100%, rgba(40,80,40,0.04) 0%, transparent 30%)",
          }} />

          <Spores />

          {/* Ground fog */}
          <div style={{
            position: "fixed", bottom: 0, left: 0, right: 0, height: "15vh",
            background: "linear-gradient(to top, rgba(10,20,10,0.4) 0%, transparent 100%)",
            pointerEvents: "none", zIndex: 0,
          }} />

          {/* Header */}
          <div style={{
            textAlign: "center", padding: "40px 20px 20px",
            position: "relative", zIndex: 1,
          }}>
            <div style={{
              fontSize: 11, letterSpacing: 6, color: "#3a5a3a",
              textTransform: "uppercase", marginBottom: 8,
              fontFamily: "'Cinzel', serif",
            }}>{"\u27e1"} blackspore.com {"\u27e1"}</div>
            <h1 style={{
              fontSize: "clamp(28px, 5vw, 44px)", fontWeight: 300, margin: 0,
              fontFamily: "'Cinzel', serif",
              background: "linear-gradient(135deg, #6aaa5a 0%, #4aff8c 40%, #2a8a4a 100%)",
              WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
              letterSpacing: 3,
              filter: "drop-shadow(0 0 20px rgba(74,255,140,0.15))",
            }}>Tarot Reading</h1>
            <div style={{
              width: 60, height: 1,
              background: "linear-gradient(90deg, transparent, #2a5a3a, transparent)",
              margin: "16px auto",
            }} />
          </div>

          {/* Welcome Phase */}
          {phase === "welcome" && (
            <div style={{
              maxWidth: 520, margin: "0 auto", padding: "20px 24px 60px",
              animation: "fadeInUp 0.8s ease", position: "relative", zIndex: 1,
            }}>
              <p style={{
                textAlign: "center", fontSize: 16, color: "#5a7a5a",
                lineHeight: 1.8, fontWeight: 300, fontStyle: "italic",
                marginBottom: 40,
              }}>
                Step into the grove. The ancient spores carry whispers of what awaits.
              </p>

              <div style={{ marginBottom: 28 }}>
                <label style={{
                  display: "block", fontSize: 11, letterSpacing: 3,
                  color: "#3a5a3a", textTransform: "uppercase", marginBottom: 10,
                  fontFamily: "'Cinzel', serif",
                }}>Your Question</label>
                <textarea
                  value={question}
                  onChange={e => setQuestion(e.target.value)}
                  placeholder="What guidance do you seek? (optional)"
                  rows={3}
                  style={{
                    width: "100%", boxSizing: "border-box", padding: "14px 16px",
                    background: "rgba(10,20,10,0.5)",
                    border: "1px solid #1a2a18",
                    borderRadius: 8, color: "#c8d4b8", fontSize: 15,
                    fontFamily: "'Cormorant Garamond', serif",
                    lineHeight: 1.6, resize: "none",
                  }}
                />
              </div>

              <div style={{ marginBottom: 36 }}>
                <label style={{
                  display: "block", fontSize: 11, letterSpacing: 3,
                  color: "#3a5a3a", textTransform: "uppercase", marginBottom: 12,
                  fontFamily: "'Cinzel', serif",
                }}>Choose Your Spread</label>
                <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                  {Object.entries(SPREADS).map(([key, s]) => (
                    <button
                      key={key}
                      onClick={() => setSpread(key)}
                      style={{
                        flex: 1, minWidth: 140, padding: "14px 12px",
                        background: spread === key ? "rgba(74,255,140,0.06)" : "rgba(10,20,10,0.4)",
                        border: `1px solid ${spread === key ? "#2a5a3a" : "#1a2a18"}`,
                        borderRadius: 8, color: spread === key ? "#6aaa6a" : "#3a5a3a",
                        cursor: "pointer", fontFamily: "'Cormorant Garamond', serif",
                        fontSize: 14, fontWeight: 600, transition: "all 0.3s",
                        letterSpacing: 1,
                        boxShadow: spread === key ? "0 0 15px rgba(74,255,140,0.05)" : "none",
                      }}
                    >
                      {s.name}
                      <div style={{ fontSize: 11, fontWeight: 300, marginTop: 4, opacity: 0.6 }}>
                        {s.count} card{s.count > 1 ? "s" : ""}
                      </div>
                    </button>
                  ))}
                </div>
              </div>

              <button
                onClick={drawCards}
                style={{
                  display: "block", width: "100%", padding: "16px 32px",
                  background: "linear-gradient(135deg, #0a2a1a 0%, #1a4a2a 100%)",
                  border: "1px solid #2a5a3a",
                  borderRadius: 10, color: "#4aff8c", fontSize: 16,
                  fontFamily: "'Cinzel', serif", fontWeight: 600,
                  letterSpacing: 3, textTransform: "uppercase",
                  cursor: "pointer", transition: "all 0.3s",
                  boxShadow: "0 4px 20px rgba(74,255,140,0.08), inset 0 1px 0 rgba(74,255,140,0.05)",
                  textShadow: "0 0 20px rgba(74,255,140,0.3)",
                }}
                onMouseOver={e => {
                  e.target.style.boxShadow = "0 8px 32px rgba(74,255,140,0.15), inset 0 1px 0 rgba(74,255,140,0.1)";
                  e.target.style.borderColor = "#4aff8c";
                }}
                onMouseOut={e => {
                  e.target.style.boxShadow = "0 4px 20px rgba(74,255,140,0.08), inset 0 1px 0 rgba(74,255,140,0.05)";
                  e.target.style.borderColor = "#2a5a3a";
                }}
              >
                {"\u27e1"} Draw the Cards {"\u27e1"}
              </button>
            </div>
          )}

          {/* Cards Phase */}
          {phase === "cards" && (
            <div style={{
              maxWidth: 960, margin: "0 auto", padding: "20px 24px 60px",
              position: "relative", zIndex: 1,
            }}>
              {question && (
                <p style={{
                  textAlign: "center", fontSize: 15, color: "#5a7a5a",
                  fontStyle: "italic", marginBottom: 32, fontWeight: 300,
                }}>
                  "{question}"
                </p>
              )}

              <div style={{
                display: "flex", justifyContent: "center", gap: 24,
                flexWrap: "wrap", marginBottom: 48,
              }}>
                {drawnCards.map((card, i) => (
                  <TarotCard
                    key={i}
                    card={card}
                    reversed={reversals[i]}
                    revealed={revealed}
                    position={SPREADS[spread].positions[i]}
                    delay={i * 200}
                  />
                ))}
              </div>

              {/* Reading */}
              <div ref={readingRef} style={{ maxWidth: 640, margin: "0 auto" }}>
                {loading && !reading && (
                  <div style={{
                    textAlign: "center", padding: 40,
                    animation: "fadeInUp 0.6s ease",
                  }}>
                    <div style={{
                      fontSize: 32, animation: "float 2s infinite",
                      marginBottom: 16, color: "#4aff8c",
                      textShadow: "0 0 20px rgba(74,255,140,0.3)",
                    }}>{"\u27e1"}</div>
                    <p style={{ color: "#3a5a3a", fontSize: 14, fontStyle: "italic" }}>
                      The spores drift through the dark…
                    </p>
                  </div>
                )}

                {error && (
                  <div style={{
                    textAlign: "center", padding: 32,
                    color: "#7a4a4a", fontStyle: "italic",
                  }}>{error}</div>
                )}

                {reading && (
                  <div style={{
                    animation: "fadeInUp 0.8s ease",
                    background: "rgba(10,20,10,0.5)",
                    border: "1px solid #1a2a18",
                    borderRadius: 12, padding: "32px 28px",
                    boxShadow: "0 0 30px rgba(74,255,140,0.03)",
                  }}>
                    <div style={{
                      textAlign: "center", fontSize: 11, letterSpacing: 4,
                      color: "#3a5a3a", textTransform: "uppercase",
                      fontFamily: "'Cinzel', serif", marginBottom: 24,
                    }}>Your Reading</div>
                    <div style={{
                      fontSize: 16, lineHeight: 1.9, color: "#a8b898",
                      fontWeight: 300, whiteSpace: "pre-wrap",
                    }}>
                      <TypingText text={reading} />
                    </div>
                  </div>
                )}

                {(reading || error) && (
                  <div style={{ textAlign: "center", marginTop: 40 }}>
                    <button
                      onClick={reset}
                      style={{
                        padding: "12px 32px",
                        background: "transparent",
                        border: "1px solid #1a2a18",
                        borderRadius: 8, color: "#3a5a3a",
                        fontSize: 13, fontFamily: "'Cinzel', serif",
                        letterSpacing: 2, textTransform: "uppercase",
                        cursor: "pointer", transition: "all 0.3s",
                      }}
                      onMouseOver={e => { e.target.style.borderColor = "#2a5a3a"; e.target.style.color = "#4aff8c"; e.target.style.textShadow = "0 0 10px rgba(74,255,140,0.2)"; }}
                      onMouseOut={e => { e.target.style.borderColor = "#1a2a18"; e.target.style.color = "#3a5a3a"; e.target.style.textShadow = "none"; }}
                    >
                      Return to the Grove
                    </button>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* Footer */}
          <div style={{
            textAlign: "center", padding: "20px 0 32px",
            fontSize: 11, color: "#1a2a18", letterSpacing: 2,
            fontFamily: "'Cinzel', serif",
            position: "relative", zIndex: 1,
          }}>
            For entertainment & reflection · Not a substitute for professional advice
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<TarotReading />);
  </script>
</body>
</html>
